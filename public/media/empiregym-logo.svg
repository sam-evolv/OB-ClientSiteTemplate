<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title>Empire Gym logo</title>
  <desc>Deep red circular Empire Gym badge with black lettering and barbell motif.</desc>
  <defs>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1b1b1b"/>
      <stop offset="100%" stop-color="#000000"/>
    </linearGradient>
  </defs>
  <circle cx="256" cy="256" r="250" fill="#E0241B"/>
  <circle cx="256" cy="256" r="250" fill="none" stroke="url(#ring)" stroke-width="18"/>
  <circle cx="256" cy="256" r="184" fill="none" stroke="#080808" stroke-width="10" opacity="0.85"/>
  <g fill="#080808" opacity="0.95">
    <rect x="114" y="215" width="22" height="82" rx="8"/>
    <rect x="136" y="225" width="16" height="62" rx="6"/>
    <rect x="360" y="215" width="22" height="82" rx="8"/>
    <rect x="360" y="225" width="16" height="62" rx="6" transform="translate(6 0)"/>
    <rect x="154" y="250" width="204" height="12" rx="6"/>
    <rect x="198" y="238" width="12" height="36" rx="4"/>
    <rect x="302" y="238" width="12" height="36" rx="4"/>
  </g>
  <text x="256" y="330" text-anchor="middle" fill="#080808" font-family="Arial, Helvetica, sans-serif" font-size="62" font-weight="900" letter-spacing="6">EMPIRE</text>
  <text x="256" y="376" text-anchor="middle" fill="#080808" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="800" letter-spacing="10">GYM</text>
</svg>
